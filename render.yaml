services:
  - type: web
    name: health-assistant-backend
    runtime: node
    plan: starter
    buildCommand: npm install --include=dev && npm run build && cd backend && npm install --include=dev && npm run build && cp -r ../dist dist-mcp
    startCommand: cd backend && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        fromService:
          type: web
          name: health-assistant-backend
          property: port
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: EPIC_CLIENT_ID
        sync: false
      - key: EPIC_BASE_URL
        value: https://fhir.epic.com/interconnect-fhir-oauth/api/FHIR/R4
      - key: EPIC_AUTH_URL
        value: https://fhir.epic.com/interconnect-fhir-oauth/oauth2/authorize
      - key: EPIC_TOKEN_URL
        value: https://fhir.epic.com/interconnect-fhir-oauth/oauth2/token
      - key: EPIC_REDIRECT_URI
        sync: false  # set to https://your-app.onrender.com/callback
      - key: TOKEN_FILE_PATH
        value: /tmp/.epic-mcp-tokens.json
      - key: PATIENT_DISTANCE_THRESHOLD_MILES
        value: "30"
